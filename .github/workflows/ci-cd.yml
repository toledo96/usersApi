name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]   # o "main" según tu repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: ./mvnw clean package --batch-mode

      - name: Run tests
        run: ./mvnw test --batch-mode

      - name: Build Docker image
        run: docker build -t usersapi:latest

      - name: Verify tests passed
        if: failure()
        run: echo "Tests failed, stopping build"